<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container" ng-app="app" ng-controller="Index">

     <div class="border rounded p-4">
            <h4 class="mb-4">Gestión de Rutas</h4>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="exampleFormControlInput1" class="form-label">Fecha de Inicio</label>
                    <input type="date" ng-model="formrutas.fechaInicio" class="form-control" id="exampleFormControlInput1">
                </div>

                <div class="col-md-4">
                    <label for="exampleFormControlInput1" class="form-label">Fecha de Conclusión</label>
                    <input type="date" ng-model="formrutas.fechaFin" class="form-control" id="exampleFormControlInput1">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Proveedor</label>
                    <select class="form-select" ng-model="formrutas.proveedor">
                        <option selected>Seleccione un proveedor</option>
                        <option value="1">Proveedor 1</option>
                        <option value="2">Proveedor 2</option>
                        <option value="3">Proveedor 3</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Auto</label>
                    <select class="form-select" ng-model="formrutas.auto">
                        <option selected>Seleccione un auto</option>
                        <option value="1">Camión 01</option>
                        <option value="2">Van 2020</option>
                        <option value="3">Nissan NP300</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Driver</label>
                    <select class="form-select" ng-model="formrutas.driver">
                        <option selected>Seleccione un driver</option>
                        <option value="1">Alexis González</option>
                        <option value="2">Ariadna Hilario</option>
                        <option value="3">Sofía Hernández</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Id ruta</label>
                    <input type="text" ng-model="formrutas.idruta" class="form-control" placeholder="Id ruta">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <button type="button" class="btn btn-danger w-100" ng-click="guardarRuta()">Buscar</button>
                </div>

                <div class="col-md-4">
                    <button type="button" class="btn btn-success w-100">Nueva Ruta</button>
                </div>
            </div>
        </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script src="js/libs/angular.min.js"></script>
<script src="js/modulos/app.module.js"></script>
<script src="js/controladores/index.controller.js"></script>


</body>
</html>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script src="js/libs/angular.min.js"></script>
<script src="js/modulos/app.module.js"></script>
<script src="js/controladores/index.controller.js"></script>


</body>
</html>
